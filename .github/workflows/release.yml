name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "package.json"
      - "packages/**"

# contents/pull-requests: let the Changesets action open the "Version packages"
# PR and push tags/releases. id-token: kept so npm provenance can be enabled
# later once the repo is public (harmless while unused).
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # registry-url makes setup-node write an .npmrc that authenticates with
      # NODE_AUTH_TOKEN, so `changeset publish` can push to npm from CI.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build, typecheck, and test
        run: bun run release:ci

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: "Version packages"
          commit: "Version packages"
        env:
          # A PAT (CHANGESETS_TOKEN) lets the auto-created "Version packages" PR
          # trigger CI; falls back to the default token if it is not set.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
          # npm auth for publishing. Set NPM_TOKEN as a repo secret (automation
          # or granular token with publish rights to your package scope).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
