name: Bug report
description: Report a reproducible Cloudflare Worker problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include access tokens, refresh tokens, cookies, or secrets. Report security issues privately through SECURITY.md.
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Which commit or revision are you running?
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local Wrangler
        - Deployed Cloudflare Worker
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps with all credentials and personal data removed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove tokens, cookies, secrets, account ids, and personal information.
